<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beranda - SSB Wind Soccer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: white;
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header h1 {
      color: #003399;
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .header p {
      color: #666;
      font-size: 15px;
      margin-bottom: 20px;
    }

    .user-info {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 20px;
      border-radius: 12px;
      border-left: 5px solid #003399;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .info-item {
      text-align: center;
      padding: 10px;
    }

    .info-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 16px;
      color: #003399;
      font-weight: 700;
    }

    /* Menu Grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 18px;
      margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-card {
      background: white;
      padding: 25px 20px;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      text-decoration: none;
      color: #333;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .menu-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .menu-card:hover::before {
      left: 100%;
    }

    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
      border-color: #003399;
    }

    .menu-card:active {
      transform: translateY(-4px);
    }

    .menu-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      transition: transform 0.3s;
    }

    .menu-card:hover .menu-icon {
      transform: scale(1.15) rotate(5deg);
    }

    .menu-title {
      font-size: 13px;
      color: #003399;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.4;
    }

    /* Logout Button */
    .btn-logout {
      background: linear-gradient(135deg, #dc3545 0%, #e74c3c 100%);
      color: white;
      padding: 14px 30px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      width: 100%;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-logout:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
    }

    .btn-logout:active {
      transform: translateY(-1px);
    }

    /* Footer */
    .footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      margin-top: 30px;
      padding: 20px;
    }

    /* Alert Modal */
    .alert-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 280px;
      max-width: 85%;
      padding: 25px;
      border-radius: 18px;
      background: white;
      color: #333;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border-top: 5px solid #999;
    }

    .alert-modal.alert-error {
      border-top-color: #dc3545;
    }

    .alert-modal.alert-info {
      border-top-color: #003399;
    }

    .alert-modal svg {
      width: 50px;
      height: 50px;
    }

    .alert-modal div {
      font-weight: 600;
      font-size: 15px;
      line-height: 1.5;
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 20px;
      }

      .header h1 {
        font-size: 22px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 12px;
      }

      .menu-card {
        padding: 20px 15px;
      }

      .menu-icon {
        font-size: 32px;
      }

      .menu-title {
        font-size: 11px;
      }

      .user-info {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 15px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 10px;
      }

      .header {
        padding: 15px;
        margin-bottom: 20px;
      }

      .header h1 {
        font-size: 18px;
      }

      .header p {
        font-size: 13px;
      }

      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .menu-card {
        padding: 15px 12px;
      }

      .menu-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }

      .menu-title {
        font-size: 10px;
      }

      .user-info {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .info-item {
        padding: 8px;
      }

      .info-label {
        font-size: 11px;
      }

      .info-value {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🏠 Selamat Datang di SSB Wind Soccer</h1>
      <p id="welcomeMsg">Loading...</p>
      
      <div class="user-info">
        <div class="info-item">
          <div class="info-label">NISW</div>
          <div class="info-value" id="userNisw">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Kategori</div>
          <div class="info-value" id="userKategori">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Tipe</div>
          <div class="info-value" id="userTipe">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Status</div>
          <div class="info-value" id="userStatus">Aktif</div>
        </div>
      </div>
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid">
      <div class="menu-card" onclick="navigateTo('absensi.html')">
        <span class="menu-icon">📋</span>
        <div class="menu-title">Presensi Latihan</div>
      </div>

      <div class="menu-card" onclick="navigateTo('datasiswa.html')">
        <span class="menu-icon">👤</span>
        <div class="menu-title">Profil Saya</div>
      </div>

      <div class="menu-card" onclick="navigateTo('informasi.html')">
        <span class="menu-icon">📊</span>
        <div class="menu-title">Informasi & Peraturan</div>
      </div>

      <div class="menu-card" onclick="navigateTo('jadwal.html')">
        <span class="menu-icon">📅</span>
        <div class="menu-title">Jadwal & Turnamen</div>
      </div>

      <div class="menu-card" onclick="navigateTo('kegiatanprestasi.html')">
        <span class="menu-icon">🏆</span>
        <div class="menu-title">Kegiatan & Prestasi</div>
      </div>

      <div class="menu-card" onclick="navigateTo('profil_pelatih.html')">
        <span class="menu-icon">👨‍🏫</span>
        <div class="menu-title">Profil Pelatih</div>
      </div>

      <div class="menu-card" onclick="navigateTo('program.html')">
        <span class="menu-icon">📘</span>
        <div class="menu-title">Program Pembinaan</div>
      </div>

      <div class="menu-card" onclick="navigateTo('saran.html')">
        <span class="menu-icon">📩</span>
        <div class="menu-title">Saran & Masukan</div>
      </div>
    </div>

    <!-- Logout Button -->
    <button class="btn-logout" onclick="logoutSiswa()">
      <i class="fas fa-sign-out-alt"></i> LOGOUT
    </button>

    <!-- Footer -->
    <div class="footer">
      © 2026 SSB Wind Soccer • Sekolah Sepak Bola Profesional
    </div>
  </div>

  <!-- ===== FIREBASE SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <!-- ===== CONFIG & DATABASE ===== -->
  <script src="firebase-config.js"></script>
  <script src="db-sync.js"></script>

  <!-- ===== MAIN SCRIPT ===== -->
  <script>
    console.log("🌐 Beranda.html loaded");

    // ===== ALERT FUNCTION =====
    function showAlert(msg, type = "error", duration = 3000) {
      console.log(`📢 Alert [${type}]:`, msg);
      
      const icons = {
        error: '<svg viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none" stroke="#003399" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>'
      };
      
      const box = document.createElement("div");
      box.className = `alert-modal alert-${type}`;
      box.innerHTML = `${icons[type]}<div>${msg}</div>`;
      document.body.appendChild(box);
      
      setTimeout(() => {
        box.style.opacity = "0";
        box.style.transition = "opacity 0.4s ease";
        setTimeout(() => box.remove(), 400);
      }, duration);
    }

    // ===== LOAD USER DATA =====
    function loadUserData() {
      console.log("👤 Loading user data...");
      
      const user = DBManager.getLoginUser();
      
      if (!user) {
        console.warn("❌ No login user found, redirect to login");
        showAlert("❌ Session Expired. Silakan Login Kembali.", "error", 1500);
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1500);
        return;
      }

      console.log("✅ User loaded:", user.nama);
      
      // Update UI
      document.getElementById("welcomeMsg").textContent = `Halo, ${user.nama}! 👋`;
      document.getElementById("userNisw").textContent = user.nisw || "-";
      document.getElementById("userKategori").textContent = user.kategori || "-";
      document.getElementById("userTipe").textContent = user.tipe || "Reguler";
      document.getElementById("userStatus").textContent = user.status || "Aktif";
    }

    // ===== NAVIGATE TO PAGE =====
    function navigateTo(page) {
      console.log("🔗 Navigating to:", page);
      window.location.href = page;
    }

    // ===== LOGOUT =====
    function logoutSiswa() {
      if (confirm("Yakin ingin logout?")) {
        console.log("🚪 User logging out...");
        
        try {
          sessionStorage.removeItem('loginUser');
          console.log("✅ Session cleared");
          window.location.href = "index.html";
        } catch (error) {
          console.error("❌ Logout error:", error);
          window.location.href = "index.html";
        }
      }
    }

    // ===== INITIALIZE =====
    document.addEventListener("DOMContentLoaded", function() {
      console.log("🎬 DOM Content Loaded");
      loadUserData();
    });

    console.log("🚀 Beranda.html script initialized");
  </script>
</body>
</html>
