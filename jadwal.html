<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal & Turnamen - SSB Wind Soccer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: white;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header h1 {
      color: #003399;
      font-size: 26px;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .header p {
      color: #666;
      font-size: 13px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-family: 'Poppins', sans-serif;
      color: #666;
    }

    .tab-btn.active {
      border-color: #003399;
      background: linear-gradient(135deg, #003399 0%, #0066cc 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(0, 51, 153, 0.3);
    }

    .tab-btn:hover {
      transform: translateY(-2px);
    }

    /* Tab Content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Schedule Card */
    .schedule-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-left: 5px solid #003399;
      transition: all 0.3s;
    }

    .schedule-card:hover {
      transform: translateX(5px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .schedule-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
    }

    .schedule-icon {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
    }

    .schedule-title {
      font-size: 15px;
      font-weight: 700;
      color: #003399;
    }

    .schedule-subtitle {
      font-size: 12px;
      color: #999;
      margin-top: 3px;
    }

    .schedule-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .info-icon {
      color: #666;
      width: 16px;
      text-align: center;
    }

    .info-label {
      color: #666;
    }

    .info-value {
      color: #003399;
      font-weight: 700;
    }

    /* Tournament Card */
    .tournament-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-top: 4px solid #ffc107;
      transition: all 0.3s;
    }

    .tournament-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .tournament-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 15px;
    }

    .tournament-badge {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: linear-gradient(135deg, #fff9c4 0%, #ffe082 100%);
      flex-shrink: 0;
    }

    .tournament-title {
      font-size: 15px;
      font-weight: 700;
      color: #003399;
    }

    .tournament-status {
      display: inline-block;
      padding: 4px 10px;
      background: #fff3cd;
      color: #856404;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 5px;
      letter-spacing: 0.2px;
    }

    .tournament-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      margin-top: 12px;
    }

    .detail-item {
      font-size: 12px;
    }

    .detail-label {
      color: #666;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .detail-value {
      color: #003399;
      font-weight: 700;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .empty-icon {
      font-size: 50px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .empty-message {
      font-size: 14px;
    }

    /* Back Button */
    .btn-back {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, #6c757d 0%, #545b62 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 0;
      }

      .header {
        padding: 20px;
      }

      .header h1 {
        font-size: 22px;
      }

      .tabs {
        padding: 12px;
        gap: 8px;
      }

      .tab-btn {
        padding: 10px 12px;
        font-size: 12px;
      }

      .schedule-card,
      .tournament-card {
        padding: 16px;
      }

      .schedule-info,
      .tournament-details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>📅 Jadwal & Turnamen</h1>
      <p>Lihat jadwal latihan dan turnamen yang akan datang</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('latihan')">
        <i class="fas fa-dumbbell"></i> Jadwal Latihan
      </button>
      <button class="tab-btn" onclick="switchTab('turnamen')">
        <i class="fas fa-trophy"></i> Turnamen
      </button>
    </div>

    <!-- Tab: Jadwal Latihan -->
    <div id="latihan" class="tab-content active">
      <div id="latihanContainer">
        <!-- Will be populated by JavaScript -->
      </div>
    </div>

    <!-- Tab: Turnamen -->
    <div id="turnamen" class="tab-content">
      <div id="turnamenContainer">
        <!-- Will be populated by JavaScript -->
      </div>
    </div>

    <!-- Back Button -->
    <button class="btn-back" onclick="backToBeranda()">
      <i class="fas fa-arrow-left"></i> KEMBALI KE BERANDA
    </button>
  </div>

  <!-- ===== FIREBASE SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <!-- ===== CONFIG & DATABASE ===== -->
  <script src="firebase-config.js"></script>
  <script src="db-sync.js"></script>

  <!-- ===== MAIN SCRIPT ===== -->
  <script>
    console.log("🌐 Jadwal.html loaded");

    // ===== SWITCH TAB =====
    function switchTab(tabName) {
      console.log("📑 Switching to tab:", tabName);
      
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      
      // Remove active from all buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      
      // Show selected tab
      document.getElementById(tabName).classList.add('active');
      
      // Add active to clicked button
      event.target.closest('.tab-btn').classList.add('active');
    }

    // ===== LOAD JADWAL LATIHAN =====
    function loadJadwalLatihan() {
      console.log("📝 Loading jadwal latihan...");
      
      DBManager.getJadwalLatihan(function(jadwalList) {
        const container = document.getElementById('latihanContainer');
        
        if (!jadwalList || jadwalList.length === 0) {
          console.log("ℹ️ No jadwal latihan data");
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <div class="empty-message">Belum ada jadwal latihan tersedia</div>
            </div>
          `;
          return;
        }

        console.log("✅ Jadwal latihan loaded:", jadwalList.length);
        
        let html = '';
        jadwalList.forEach((jadwal, index) => {
          html += `
            <div class="schedule-card">
              <div class="schedule-header">
                <div class="schedule-icon">
                  <i class="fas fa-dumbbell"></i>
                </div>
                <div>
                  <div class="schedule-title">${jadwal.hari || 'Jadwal'}</div>
                  <div class="schedule-subtitle">Sesi Latihan</div>
                </div>
              </div>
              <div class="schedule-info">
                <div class="info-item">
                  <i class="fas fa-clock info-icon"></i>
                  <span class="info-label">Waktu:</span>
                  <span class="info-value">${jadwal.waktu || '-'}</span>
                </div>
                <div class="info-item">
                  <i class="fas fa-map-marker-alt info-icon"></i>
                  <span class="info-label">Tempat:</span>
                  <span class="info-value">${jadwal.tempat || '-'}</span>
                </div>
              </div>
            </div>
          `;
        });
        
        container.innerHTML = html;
      });
    }

    // ===== LOAD JADWAL TURNAMEN =====
    function loadJadwalTurnamen() {
      console.log("🏆 Loading jadwal turnamen...");
      
      DBManager.getJadwalTurnamen(function(turnamenList) {
        const container = document.getElementById('turnamenContainer');
        
        if (!turnamenList || turnamenList.length === 0) {
          console.log("ℹ️ No jadwal turnamen data");
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🏆</div>
              <div class="empty-message">Belum ada turnamen tersedia</div>
            </div>
          `;
          return;
        }

        console.log("✅ Jadwal turnamen loaded:", turnamenList.length);
        
        let html = '';
        turnamenList.forEach((turnamen, index) => {
          html += `
            <div class="tournament-card">
              <div class="tournament-header">
                <div class="tournament-badge">
                  <i class="fas fa-trophy"></i>
                </div>
                <div style="flex: 1;">
                  <div class="tournament-title">${turnamen.namaEvent || 'Turnamen'}</div>
                  <div class="tournament-status">${turnamen.status || 'Upcoming'}</div>
                </div>
              </div>
              <div class="tournament-details">
                <div class="detail-item">
                  <div class="detail-label">📅 Tanggal</div>
                  <div class="detail-value">${formatDate(turnamen.tanggal) || '-'}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">🕐 Waktu</div>
                  <div class="detail-value">${turnamen.waktu || '-'}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">📍 Lokasi</div>
                  <div class="detail-value">${turnamen.lokasi || '-'}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">🎯 Status</div>
                  <div class="detail-value">${turnamen.status || '-'}</div>
                </div>
              </div>
            </div>
          `;
        });
        
        container.innerHTML = html;
      });
    }

    // ===== FORMAT DATE =====
    function formatDate(date) {
      if (!date) return "-";
      
      if (typeof date === 'string') {
        if (date.includes('/')) return date;
        if (date.includes('-')) {
          const [tahun, bulan, hari] = date.split('-');
          return `${hari}/${bulan}/${tahun}`;
        }
      }
      
      return new Date(date).toLocaleDateString('id-ID');
    }

    // ===== BACK TO BERANDA =====
    function backToBeranda() {
      console.log("🔙 Back to beranda");
      window.location.href = "beranda.html";
    }

    // ===== INITIALIZE =====
    document.addEventListener("DOMContentLoaded", function() {
      console.log("🎬 DOM Content Loaded");
      
      // Check if user logged in
      const user = DBManager.getLoginUser();
      if (!user) {
        console.warn("❌ No login user");
        window.location.href = "index.html";
        return;
      }

      loadJadwalLatihan();
      loadJadwalTurnamen();
      
      console.log("🚀 Jadwal.html script initialized");
    });
  </script>
</body>
</html>
