<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Verifikasi</title>
    <style>
        body { font-family: Arial, sans-serif; background: #003399; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; }
        th { background: #003399; color: white; }
        .btn-ok { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-reject { background: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        .alert { padding: 15px; margin: 15px 0; border-radius: 8px; font-weight: bold; }
        .alert.success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;color:#003399;">Verifikasi Pendaftaran Siswa Baru</h1>
    <p style="text-align:center;">Antrean: <strong id="count">0</strong></p>

    <div id="alertBox" class="alert" style="display:none;"></div>

    <button onclick="render()" style="padding:12px 25px;background:#17a2b8;color:white;border:none;border-radius:8px;cursor:pointer;">🔄 Refresh</button>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>NISW</th>
                <th>Nama</th>
                <th>Jalur</th>
                <th>Kategori</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="listPendaftar"></tbody>
    </table>
</div>

<!-- MODAL NOMINAL -->
<div id="modalNominal" class="modal">
    <div class="modal-content">
        <h3>💰 Masukkan Biaya Pendaftaran</h3>
        <input type="number" id="inputNominal" value="500000" style="width:100%;padding:15px;font-size:18px;margin:15px 0;border:2px solid #003399;border-radius:8px;">
        <div style="display:flex;gap:10px">
            <button onclick="cancelModal()" style="flex:1;padding:14px;background:#6c757d;color:white;border:none;border-radius:8px;">BATAL</button>
            <button onclick="prosesSetujui()" style="flex:1;padding:14px;background:#27ae60;color:white;border:none;border-radius:8px;">KONFIRMASI & KIRIM WA</button>
        </div>
    </div>
</div>

<script src="db-sync.js"></script>
<script>
    let currentNisw = null;

    function showAlert(msg, type = 'success') {
        const box = document.getElementById('alertBox');
        box.textContent = msg;
        box.className = `alert ${type}`;
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 4000);
    }

    function render() {
        console.log("🔄 Rendering verifikasi...");
        const tbody = document.getElementById("listPendaftar");
        DBManager.getPendaftar(function(data) {
            console.log("📋 Data pendaftar diterima:", data.length);
            tbody.innerHTML = "";
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;">Tidak ada pendaftar</td></tr>`;
                document.getElementById("count").textContent = "0";
                return;
            }
            data.forEach((s, i) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${i+1}</td>
                        <td><strong>${s.nisw}</strong></td>
                        <td>${s.nama}</td>
                        <td>${s.tipe}</td>
                        <td>${s.kategori}</td>
                        <td>
                            <button class="btn-ok" onclick="bukaModal('${s.nisw}')">✓ SETUJUI</button>
                            <button class="btn-reject" onclick="tolak('${s.nisw}')">✕ TOLAK</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById("count").textContent = data.length;
        });
    }

    function bukaModal(nisw) {
        console.log("🟢 Klik SETUJUI - NISW:", nisw);
        currentNisw = nisw;
        document.getElementById('modalNominal').style.display = 'flex';
    }

    function cancelModal() {
        document.getElementById('modalNominal').style.display = 'none';
        currentNisw = null;
    }

    function prosesSetujui() {
        const nominal = parseInt(document.getElementById('inputNominal').value) || 500000;
        document.getElementById('modalNominal').style.display = 'none';

        console.log("💰 Proses setujui dengan nominal:", nominal);

        DBManager.approvePendaftar(currentNisw, function(berhasil) {
            if (berhasil) {
                showAlert(`✅ Disetujui! NISW: ${currentNisw}`, 'success');
                
                const pendaftar = DBManager.getPendaftar().find(p => p.nisw === currentNisw) || {};
                const noHp = (pendaftar.noHp || "").replace(/^0/, "62");
                const nama = pendaftar.nama || "Orang Tua";

                const pesan = `Halo Bapak/Ibu ${nama}%0A%0A✅ Pendaftaran DITERIMA!%0ANISW: ${currentNisw}%0ABiaya: Rp ${nominal.toLocaleString('id-ID')}%0A%0ASilakan lakukan pembayaran. Terima kasih! ⚽`;

                console.log("📱 Membuka WA ke nomor:", noHp);
                window.open(`https://wa.me/${noHp}?text=${pesan}`, '_blank');

                render();
                currentNisw = null;
            }
        });
    }

    function tolak(nisw) {
        if (!confirm(`Tolak pendaftaran ${nisw}?`)) return;
        DBManager.rejectPendaftar(nisw, function(berhasil) {
            if (berhasil) {
                showAlert(`❌ Ditolak! NISW: ${nisw}`, 'error');
                render();
            }
        });
    }

    // Auto refresh
    setInterval(render, 3000);
    window.onload = render;
</script>
</body>
</html>
