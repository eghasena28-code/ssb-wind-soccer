<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Verifikasi - SSB Wind Soccer</title>
    <style>
        :root {
            --primary: #003399;
            --secondary: #ffb400;
            --success: #27ae60;
            --danger: #dc3545;
            --info: #17a2b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #003399 0%, #001f66 100%);
            padding: 20px; 
            min-height: 100vh;
        }
        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 24px; }
        .badge-count { 
            background: var(--danger); color: white; padding: 8px 16px; 
            border-radius: 50px; font-weight: bold; font-size: 18px; 
        }
        .refresh-btn {
            display: block; margin: 20px auto; padding: 12px 30px;
            background: var(--info); color: white; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #ddd; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-reguler { background: #e3f2fd; color: var(--primary); }
        .badge-beasiswa { background: #e8f5e9; color: var(--success); }
        .badge-pending { background: #fff3e0; color: #f57c00; }
        .btn-ok { 
            background: var(--success); color: white; border: none; 
            padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        .btn-ok:hover { background: #229954; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: 600; }
        .alert.success { background: #d4edda; color: #155724; display: block; }
        .alert.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✅ Verifikasi Pendaftaran Siswa Baru</h1>
        <p>Antrean Pendaftar: <span class="badge-count" id="count">0</span></p>
    </div>

    <div id="alertBox" class="alert"></div>

    <button class="refresh-btn" id="btnRefresh" onclick="refreshData()">🔄 REFRESH DATA</button>

    <table id="tableVerifikasi">
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Jalur</th>
                <th>Kategori</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="listPendaftar">
            <tr><td colspan="6" style="text-align:center; padding:40px;">⏳ Memuat data...</td></tr>
        </tbody>
    </table>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="db-sync.js"></script>

<script>
    function showAlert(message, type = 'info') {
        const alertBox = document.getElementById('alertBox');
        alertBox.textContent = message;
        alertBox.className = `alert ${type}`;
        if (type !== 'error') {
            setTimeout(() => alertBox.className = 'alert', 3000);
        }
    }

    function render() {
        const tbody = document.getElementById("listPendaftar");
        const countEl = document.getElementById("count");

        DBManager.getPendaftar(function(data) {
            tbody.innerHTML = "";

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">✅ Tidak ada pendaftar yang menunggu verifikasi</td></tr>';
                countEl.innerText = "0";
                return;
            }

            data.forEach((s) => {
                const tipeClass = s.tipe === 'Beasiswa' ? 'badge-beasiswa' : 'badge-reguler';
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${s.nisw}</strong></td>
                        <td><strong>${s.nama || '-'}</strong></td>
                        <td><span class="badge ${tipeClass}">${s.tipe || 'Reguler'}</span></td>
                        <td>${s.kategori || '-'}</td>
                        <td><span class="badge badge-pending">Menunggu</span></td>
                        <td>
                            <button class="btn-ok" onclick="setujui('${s.nisw}')">
                                ✓ SETUJUI
                            </button>
                        </td>
                    </tr>
                `;
            });

            countEl.innerText = data.length;
        });
    }

    // === FUNGSI SETUJUI BARU (PAKAI NISW) ===
    function setujui(nisw) {
        if (!confirm(`Yakin menyetujui pendaftaran ${nisw}?`)) return;

        DBManager.approvePendaftar(nisw, function(berhasil, niswBaru) {
            if (berhasil) {
                showAlert(`✅ Berhasil disetujui!\nNISW: ${niswBaru}`, 'success');
                setTimeout(() => render(), 1500);
            } else {
                showAlert("❌ Gagal menyetujui pendaftaran", 'error');
            }
        });
    }

    function refreshData() {
        const btn = document.getElementById("btnRefresh");
        btn.disabled = true;
        btn.innerHTML = '🔄 MEMUAT...';
        setTimeout(() => {
            render();
            btn.disabled = false;
            btn.innerHTML = '🔄 REFRESH DATA';
        }, 600);
    }

    // INIT
    document.addEventListener('DOMContentLoaded', function() {
        render();
        setInterval(render, 300000); // auto refresh 5 menit
    });
</script>
</body>
</html>
