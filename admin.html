<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SSB Wind Soccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #003399; --secondary: #ffb400; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --info: #17a2b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); height: 100vh; color: white; position: fixed; padding: 20px; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar h2 { font-size: 18px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; margin-bottom: 30px; text-align: center; }
        .nav-link { display: block; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-size: 14px; position: relative; }
        .nav-link:hover, .nav-link.active { background: var(--secondary); color: var(--primary); font-weight: bold; }
        .badge-notif { background: var(--danger); color: white; padding: 2px 8px; border-radius: 20px; font-size: 10px; position: absolute; right: 10px; top: 12px; }
        
        /* Main Content */
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h3 { color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 15px; margin-bottom: 20px; }
        
        /* Table Style */
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .img-preview { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        
        /* Buttons & Inputs */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 12px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: var(--info); color: white; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 10px; }
            .sidebar h2, .nav-link span:not(.badge-notif) { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ADMIN WIND SOCCER</h2>
        <div class="nav-link active" onclick="showSection('db_siswa')"><i class="fas fa-users"></i> <span>Database Siswa</span></div>
        <div class="nav-link" onclick="showSection('verifikasi')">
            <i class="fas fa-check-circle"></i> <span>Verifikasi</span>
            <span id="badgeCount" class="badge-notif" style="display:none;">0</span>
        </div>
        <div class="nav-link" onclick="showSection('raport')"><i class="fas fa-chart-bar"></i> <span>Input Raport</span></div>
        <div class="nav-link" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></div>
    </div>

    <div class="main-content">
        <div id="db_siswa" class="section active">
            <div class="card">
                <h3>👥 Database Siswa Aktif</h3>
                <table id="tableSiswa">
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>NISW</th>
                            <th>Nama</th>
                            <th>Kategori</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="listSiswa"></tbody>
                </table>
            </div>
        </div>

        <div id="verifikasi" class="section">
            <div class="card">
                <h3>✅ Verifikasi Pendaftar Baru</h3>
                <p>Siswa yang baru mendaftar akan muncul di sini untuk divalidasi Coach.</p>
                <table>
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>NISW</th>
                            <th>Tipe</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="listVerifikasi"></tbody>
                </table>
            </div>
        </div>

        <div id="raport" class="section">
            <div class="card">
                <h3>📊 Input Nilai Raport</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="cariNisw" placeholder="Masukkan NISW Siswa...">
                    <button class="btn btn-info" onclick="cariSiswaRaport()">Cari</button>
                </div>
                
                <div id="formRaport" style="display:none;">
                    <h4 id="namaSiswaRaport">Nama Siswa</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div><label>Passing</label><input type="number" id="n_passing"></div>
                        <div><label>Shooting</label><input type="number" id="n_shooting"></div>
                        <div><label>Dribbling</label><input type="number" id="n_dribbling"></div>
                        <div><label>Control</label><input type="number" id="n_control"></div>
                    </div>
                    <textarea id="catatanPelatih" placeholder="Catatan Perkembangan..."></textarea>
                    <button class="btn btn-success" onclick="simpanNilai()">Simpan Nilai</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-DVKZfDHpfFl6kE_uupT5GFinwNaWhpw",
            authDomain: "ssb-wind-soccer-110.firebaseapp.com",
            databaseURL: "https://ssb-wind-soccer-110-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "ssb-wind-soccer-110",
            storageBucket: "ssb-wind-soccer-110.firebasestorage.app",
            messagingSenderId: "128234924459",
            appId: "1:128234924459:web:37d97f167996d7d67ecaee"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Navigasi
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 2. Load Data Secara Real-time
        db.ref('pendaftar').on('value', (snapshot) => {
            const data = snapshot.val();
            const listSiswa = document.getElementById('listSiswa');
            const listVerifikasi = document.getElementById('listVerifikasi');
            const badge = document.getElementById('badgeCount');
            
            listSiswa.innerHTML = "";
            listVerifikasi.innerHTML = "";
            let countVerif = 0;

            for (let id in data) {
                const s = data[id];
                if (s.status === "Aktif") {
                    listSiswa.innerHTML += `
                        <tr>
                            <td><img src="${s.foto || 'user.png'}" class="img-preview"></td>
                            <td>${s.nisw}</td>
                            <td>${s.nama}</td>
                            <td>${s.kategori}</td>
                            <td><button class="btn btn-danger" onclick="hapusSiswa('${s.nisw}')">Hapus</button></td>
                        </tr>`;
                } else {
                    countVerif++;
                    listVerifikasi.innerHTML += `
                        <tr>
                            <td>${s.nama}</td>
                            <td>${s.nisw}</td>
                            <td>${s.tipe}</td>
                            <td>
                                <button class="btn btn-success" onclick="verifikasiSiswa('${s.nisw}')">Terima</button>
                                <button class="btn btn-danger" onclick="hapusSiswa('${s.nisw}')">Tolak</button>
                            </td>
                        </tr>`;
                }
            }
            
            if(countVerif > 0) {
                badge.style.display = "block";
                badge.innerText = countVerif;
            } else {
                badge.style.display = "none";
            }
        });

        // 3. Fungsi Verifikasi
        function verifikasiSiswa(nisw) {
            if(confirm("Aktifkan siswa ini?")) {
                db.ref('pendaftar/' + nisw).update({ status: "Aktif" });
            }
        }

        // 4. Fungsi Hapus
        function hapusSiswa(nisw) {
            if(confirm("Hapus data ini secara permanen?")) {
                db.ref('pendaftar/' + nisw).remove();
            }
        }

        // 5. Logika Raport
        let targetNisw = "";
        function cariSiswaRaport() {
            const nisw = document.getElementById('cariNisw').value;
            db.ref('pendaftar/' + nisw).once('value', (snapshot) => {
                const s = snapshot.val();
                if(s) {
                    targetNisw = nisw;
                    document.getElementById('namaSiswaRaport').innerText = s.nama + " (" + s.nisw + ")";
                    document.getElementById('formRaport').style.display = "block";
                } else {
                    alert("Siswa tidak ditemukan!");
                }
            });
        }

        function simpanNilai() {
            const dataNilai = {
                passing: document.getElementById('n_passing').value,
                shooting: document.getElementById('n_shooting').value,
                dribbling: document.getElementById('n_dribbling').value,
                control: document.getElementById('n_control').value,
                catatan: document.getElementById('catatanPelatih').value,
                lastUpdate: new Date().toISOString()
            };
            db.ref('raport/' + targetNisw).set(dataNilai).then(() => {
                alert("Nilai berhasil disimpan!");
            });
        }

        function logoutAdmin() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
