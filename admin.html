<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Terintegrasi - SSB Wind Soccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #003399; --secondary: #ffb400; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --info: #17a2b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f7f6; display: flex; }
        .sidebar { width: 260px; background: var(--primary); height: 100vh; color: white; position: fixed; padding: 20px; box-sizing: border-box; z-index: 1000; overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-content { flex: 1; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; margin-bottom: 30px; text-align: center; }
        .nav-link { display: block; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-size: 14px; position: relative; }
        .nav-link:hover, .nav-link.active { background: var(--secondary); color: var(--primary); font-weight: bold; }
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); min-height: 100vh; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .finance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { padding: 15px; border-radius: 12px; color: white; text-align: center; }
        .stat-box span { font-size: 12px; opacity: 0.9; }
        .stat-box h3 { color: white !important; margin: 8px 0 0 0; font-size: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; color: var(--primary); font-weight: bold; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-content">
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="logossb.png" style="width: 70px;" alt="SSB Wind Soccer">
        </div>
        <h2>ADMIN WIND SOCCER</h2>
        <div class="nav-link" onclick="showSection('keuangan')">💰 Keuangan & Kas</div>
        <!-- nav lain tetap ada, tapi untuk fokus sekarang kita test Keuangan dulu -->
    </div>
</div>

<div class="main-content">
    <div id="keuangan" class="section active">
        <div class="finance-grid">
            <div class="stat-box" style="background: var(--primary);"><span>Total Masuk</span><h3 id="totalMasuk">Rp 0</h3></div>
            <div class="stat-box" style="background: var(--danger);"><span>Total Keluar</span><h3 id="totalKeluar">Rp 0</h3></div>
            <div class="stat-box" style="background: var(--success);"><span>Saldo Kas</span><h3 id="saldoAkhir">Rp 0</h3></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <!-- Pemasukan -->
            <div class="card">
                <h4>💰 Catat Pemasukan</h4>
                <label>NISW (kosongkan jika bukan siswa)</label>
                <input type="text" id="niswBayar" placeholder="R2026001" oninput="cekSiswaOtomatis()">
                <label>Diterima Dari</label>
                <input type="text" id="pengirimMasuk" placeholder="Nama Pembayar">
                <label>Nominal Rp</label>
                <input type="number" id="nomBayar" placeholder="500000">
                <label>Kategori</label>
                <select id="jenisPemasukan">
                    <option value="SPP">SPP</option>
                    <option value="Daftar">Uang Pendaftaran</option>
                    <option value="Sponsor">Sponsor</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
                <label>Keterangan</label>
                <textarea id="ketMasuk" rows="2"></textarea>
                <button class="btn btn-add" onclick="transaksiMasuk()"><i class="fas fa-save"></i> SIMPAN PEMASUKAN</button>
            </div>

            <!-- Pengeluaran -->
            <div class="card">
                <h4>💸 Catat Pengeluaran</h4>
                <label>Keperluan</label>
                <input type="text" id="ketKeluar" placeholder="Contoh: Beli bola">
                <label>Nominal Rp</label>
                <input type="number" id="nomKeluar" placeholder="250000">
                <label>Catatan</label>
                <textarea id="catatanKeluar" rows="2"></textarea>
                <button class="btn btn-danger" onclick="transaksi('Keluar')"><i class="fas fa-save"></i> SIMPAN PENGELUARAN</button>
            </div>
        </div>

        <div class="card">
            <h3>Riwayat Keuangan</h3>
            <button class="btn btn-info" onclick="renderAll()" style="margin-bottom:15px; width:auto; padding:8px 20px;">🔄 Refresh Tabel</button>
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Jenis</th>
                        <th>Keterangan</th>
                        <th>Nominal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="listKeuangan"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- === FIREBASE & DBManager === -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="db-sync.js"></script>

<script>
    // ==================== FUNGSI KEUANGAN LENGKAP (SUDAH DIPERBAIKI) ====================
    function cekSiswaOtomatis() {
        const nisw = document.getElementById("niswBayar").value.trim().toUpperCase();
        if (nisw === "") return;
        const siswa = DBManager.findSiswa(nisw);
        if (siswa) {
            document.getElementById("pengirimMasuk").value = siswa.nama + " (Siswa)";
        }
    }

    function transaksiMasuk() {
        const nisw = document.getElementById("niswBayar").value.trim();
        const pengirim = document.getElementById("pengirimMasuk").value.trim();
        const nominal = parseInt(document.getElementById("nomBayar").value);
        const kategori = document.getElementById("jenisPemasukan").value;
        let ket = document.getElementById("ketMasuk").value.trim();

        if (!nominal || nominal <= 0) {
            alert("❌ Nominal harus diisi dengan benar!");
            return;
        }
        if (!ket) ket = pengirim || "Pemasukan Umum";

        const data = {
            tgl: DBManager.getTglSekarang(),
            jenis: "Masuk",
            keterangan: ket,
            nominal: nominal,
            nisw: nisw || "",
            kategori: kategori
        };

        DBManager.addKeuangan(data);   // ← ini yang menyimpan ke Firebase + localStorage
        renderAll();

        // Clear form
        document.getElementById("niswBayar").value = '';
        document.getElementById("pengirimMasuk").value = '';
        document.getElementById("nomBayar").value = '';
        document.getElementById("ketMasuk").value = '';

        alert("✅ Pemasukan berhasil disimpan dan muncul di rekap!");
    }

    function transaksi(jenis) {
        const nominal = parseInt(document.getElementById("nomKeluar").value);
        const ket = document.getElementById("ketKeluar").value.trim();
        const catatan = document.getElementById("catatanKeluar").value.trim();

        if (!nominal || nominal <= 0) {
            alert("❌ Nominal harus diisi!");
            return;
        }

        const data = {
            tgl: DBManager.getTglSekarang(),
            jenis: jenis,
            keterangan: ket || catatan || "Pengeluaran",
            nominal: nominal,
            nisw: ""
        };

        DBManager.addKeuangan(data);
        renderAll();

        // Clear form
        document.getElementById("ketKeluar").value = '';
        document.getElementById("nomKeluar").value = '';
        document.getElementById("catatanKeluar").value = '';

        alert("✅ Pengeluaran berhasil disimpan!");
    }

    function renderKeuangan() {
        const data = DBManager.getKeuangan() || [];
        const tbody = document.getElementById("listKeuangan");
        tbody.innerHTML = "";

        let totalMasuk = 0, totalKeluar = 0;

        data.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${item.tgl}</td>
                <td><strong style="color:${item.jenis==='Masuk'?'#28a745':'#dc3545'}">${item.jenis}</strong></td>
                <td>${item.keterangan}</td>
                <td style="text-align:right; font-weight:bold;">Rp ${item.nominal.toLocaleString('id-ID')}</td>
                <td><button class="btn btn-danger" style="padding:4px 8px; font-size:11px;" onclick="hapusKeuangan(${index})">Hapus</button></td>
            `;
            tbody.appendChild(row);

            if (item.jenis === "Masuk") totalMasuk += item.nominal;
            else totalKeluar += item.nominal;
        });

        const saldo = totalMasuk - totalKeluar;

        document.getElementById("totalMasuk").textContent = "Rp " + totalMasuk.toLocaleString('id-ID');
        document.getElementById("totalKeluar").textContent = "Rp " + totalKeluar.toLocaleString('id-ID');
        document.getElementById("saldoAkhir").textContent = "Rp " + saldo.toLocaleString('id-ID');
        document.getElementById("saldoAkhir").style.color = saldo >= 0 ? "#28a745" : "#dc3545";
    }

    function hapusKeuangan(index) {
        if (confirm("Yakin hapus transaksi ini?")) {
            DBManager.deleteKeuangan(index);
            renderAll();
        }
    }

    // Fungsi umum yang dipanggil dari nav
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        renderAll();
    }

    function renderAll() {
        renderKeuangan();
        console.log("✅ Keuangan & Kas sudah di-refresh");
    }

    // Auto init
    document.addEventListener('DOMContentLoaded', () => {
        renderAll();
        setInterval(renderAll, 8000);
    });
</script>
</body>
</html>
