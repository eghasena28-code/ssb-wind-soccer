<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SSB Wind Soccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #003399; --secondary: #ffb400; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --info: #17a2b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; }
        
        /* Sidebar - KEMBALI KE ASLI */
        .sidebar { width: 260px; background: var(--primary); height: 100vh; color: white; position: fixed; padding: 20px; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar h2 { font-size: 18px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; margin-bottom: 30px; text-align: center; }
        .nav-link { display: block; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-size: 14px; position: relative; }
        .nav-link:hover, .nav-link.active { background: var(--secondary); color: var(--primary); font-weight: bold; }
        .badge-notif { background: var(--danger); color: white; padding: 2px 8px; border-radius: 20px; font-size: 10px; position: absolute; right: 10px; top: 12px; }
        
        /* Main Content */
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h3 { color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 15px; margin-bottom: 20px; }
        
        /* Table Style */
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .img-preview { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 12px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: var(--info); color: white; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ADMIN WIND SOCCER</h2>
        <div class="nav-link active" onclick="showSection('db_siswa')"><i class="fas fa-users"></i> <span>Database Siswa</span></div>
        <div class="nav-link" onclick="showSection('verifikasi')">
            <i class="fas fa-check-circle"></i> <span>Verifikasi</span>
            <span id="badgeCount" class="badge-notif" style="display:none;">0</span>
        </div>
        <div class="nav-link" onclick="showSection('raport')"><i class="fas fa-chart-bar"></i> <span>Input Raport</span></div>
        <div class="nav-link" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></div>
    </div>

    <div class="main-content">
        <div id="db_siswa" class="section active">
            <div class="card">
                <h3>👥 Database Siswa Aktif</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>NISW</th>
                            <th>Nama</th>
                            <th>Kategori</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="listSiswa"></tbody>
                </table>
            </div>
        </div>

        <div id="verifikasi" class="section">
            <div class="card">
                <h3>✅ Verifikasi Pendaftar Baru</h3>
                <p>Data pendaftar akan otomatis masuk ke sini.</p>
                <table>
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>NISW</th>
                            <th>Tipe</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="listVerifikasi"></tbody>
                </table>
            </div>
        </div>

        <div id="raport" class="section">
            <div class="card">
                <h3>📊 Input Nilai Raport</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="cariNisw" placeholder="Masukkan NISW...">
                    <button class="btn btn-info" onclick="cariSiswa()">Cari</button>
                </div>
                <div id="formRaport" style="display:none; margin-top:20px;">
                    <h4 id="namaTerpilih"></h4>
                    <input type="number" id="n_passing" placeholder="Passing">
                    <input type="number" id="n_shooting" placeholder="Shooting">
                    <textarea id="catatan" placeholder="Catatan..."></textarea>
                    <button class="btn btn-success" onclick="simpanNilai()">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        // CONFIG FIREBASE - Pastikan sama dengan pendaftaran.html
        const firebaseConfig = {
            apiKey: "AIzaSyC-DVKZfDHpfFl6kE_uupT5GFinwNaWhpw",
            authDomain: "ssb-wind-soccer-110.firebaseapp.com",
            databaseURL: "https://ssb-wind-soccer-110-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "ssb-wind-soccer-110",
            storageBucket: "ssb-wind-soccer-110.firebasestorage.app",
            messagingSenderId: "128234924459",
            appId: "1:128234924459:web:37d97f167996d7d67ecaee"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // LOGIKA UTAMA: SINKRONISASI NODE 'pendaftar'
        db.ref('pendaftar').on('value', (snapshot) => {
            const data = snapshot.val();
            const listSiswa = document.getElementById('listSiswa');
            const listVerif = document.getElementById('listVerifikasi');
            const badge = document.getElementById('badgeCount');
            
            listSiswa.innerHTML = "";
            listVerif.innerHTML = "";
            let vCount = 0;

            for (let id in data) {
                const s = data[id];
                // Syarat tampil di Siswa Aktif
                if (s.status === "Aktif") {
                    listSiswa.innerHTML += `<tr>
                        <td><img src="${s.foto || 'user.png'}" class="img-preview"></td>
                        <td>${s.nisw}</td><td>${s.nama}</td><td>${s.kategori || 'U-12'}</td>
                        <td><button class="btn btn-danger" onclick="hapus('${id}')">Hapus</button></td>
                    </tr>`;
                } 
                // Syarat tampil di Verifikasi
                else {
                    vCount++;
                    listVerif.innerHTML += `<tr>
                        <td>${s.nama}</td><td>${s.nisw}</td><td>${s.tipe}</td>
                        <td>
                            <button class="btn btn-success" onclick="terima('${id}')">Terima</button>
                            <button class="btn btn-danger" onclick="hapus('${id}')">Tolak</button>
                        </td>
                    </tr>`;
                }
            }
            badge.innerText = vCount;
            badge.style.display = vCount > 0 ? "block" : "none";
        });

        function terima(id) {
            db.ref('pendaftar/' + id).update({ status: "Aktif" });
        }

        function hapus(id) {
            if(confirm("Hapus data?")) db.ref('pendaftar/' + id).remove();
        }

        function logoutAdmin() { window.location.href = "index.html"; }
    </script>
</body>
</html>
