<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendaftaran Reguler - SSB Wind Soccer</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #003399; margin: 0; display: flex; justify-content: center; padding: 20px; }
    .card { background: white; width: 100%; max-width: 520px; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 8px solid #ffb400; }
    .header { text-align: center; margin-bottom: 25px; }
    .logo { width: 85px; }
    h2 { color: #003399; margin: 10px 0; text-transform: uppercase; font-size: 22px; }
    section { background: #f9f9f9; border: 1px solid #eee; padding: 18px; border-radius: 12px; margin-bottom: 18px; }
    label { display: block; font-size: 13.5px; font-weight: bold; margin-bottom: 6px; color: #003399; }
    input, select, textarea { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14.5px; }
    .btn-submit { width: 100%; padding: 15px; background: #ffb400; color: #003399; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <img src="logossb.png" class="logo">
    <h2>PENDAFTARAN SISWA BARU</h2>
  </div>

  <form id="formPendaftaran">
    <section>
      <label>Nama Lengkap Siswa</label>
      <input type="text" id="nama" required placeholder="Nama Lengkap">

      <label>Tanggal Lahir</label>
      <input type="date" id="tglLahir" required oninput="hitungOtomatis()">

      <label>Usia (Otomatis)</label>
      <input type="text" id="usia" readonly>

      <label>Kategori Umur (Otomatis)</label>
      <input type="text" id="kategori" readonly>
    </section>

    <section>
      <label>Posisi Favorit</label>
      <select id="posisi" required>
        <option value="">-- Pilih Posisi --</option>
        <option value="Kiper">Kiper (GK)</option>
        <option value="Bek">Bek (DF)</option>
        <option value="Gelandang">Gelandang (MF)</option>
        <option value="Penyerang">Penyerang (FW)</option>
      </select>

      <label>Nama Orang Tua / Wali</label>
      <input type="text" id="namaOrtu" required placeholder="Nama Ibu/Ayah">

      <label>No. WhatsApp</label>
      <input type="tel" id="noHp" required placeholder="0812xxxxxxxx">

      <label>Alamat Lengkap</label>
      <textarea id="alamat" rows="2" required placeholder="Alamat lengkap..."></textarea>
    </section>

    <section>
      <label>Upload Foto Siswa</label>
      <input type="file" id="foto" accept="image/*" required>
    </section>

    <button type="submit" class="btn-submit" id="btnSubmit">KIRIM PENDAFTARAN</button>
  </form>
</div>

<!-- Firebase SDK harus dimuat sebelum db-sync.js -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="db-sync.js"></script>
<script>
// ===== PERBAIKAN: Helper Function untuk Kategori KU-XX =====
function getKategoriUmur(usia) {
    if (usia >= 17) return "KU-17";
    if (usia >= 15) return "KU-16";
    if (usia >= 13) return "KU-14";
    if (usia >= 11) return "KU-12";
    if (usia >= 9) return "KU-10";
    if (usia >= 7) return "KU-8";
    return "KU-6";
}

// HITUNG OTOMATIS - PERBAIKAN: Gunakan KU-XX bukan "Class of"
function hitungOtomatis() {
    const tgl = document.getElementById("tglLahir").value;
    if (!tgl) return;

    const tahunLahir = new Date(tgl).getFullYear();
    const usia = new Date().getFullYear() - tahunLahir;

    // Usia
    document.getElementById("usia").value = usia + " Tahun";

    // ✅ PERBAIKAN: Format KU-XX (konsisten dengan beasiswa & admin)
    const kategori = getKategoriUmur(usia);
    document.getElementById("kategori").value = kategori;
}

// SUBMIT FORM
document.getElementById("formPendaftaran").onsubmit = async function(e) {
    e.preventDefault();

    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    btn.textContent = "Mengirim...";

    // Pastikan Firebase sudah siap
    if (typeof initializeFirebase === 'function') {
        await initializeFirebase();
    }

    const tglLahir = document.getElementById("tglLahir").value;
    const tahunLahir = new Date(tglLahir).getFullYear();
    const usia = new Date().getFullYear() - tahunLahir;

    const dataBaru = {
        nama: document.getElementById("nama").value.trim(),
        tglLahir: tglLahir,
        tahunLahir: tahunLahir,
        usia: usia,
        kategori: getKategoriUmur(usia),  // ✅ PERBAIKAN: Gunakan KU-XX
        posisi: document.getElementById("posisi").value,
        namaOrtu: document.getElementById("namaOrtu").value.trim(),
        noHp: document.getElementById("noHp").value.trim(),
        alamat: document.getElementById("alamat").value.trim(),
        tipe: "Reguler",
        status: "Menunggu Verifikasi",
        tglDaftar: DBManager.getTglSekarang()
    };

    try {
        const niswBaru = await DBManager.addPendaftar(dataBaru);
        alert(`✅ Pendaftaran Berhasil!\nNISW: ${niswBaru}\nKategori: ${dataBaru.kategori}`);
        window.location.href = "index.html";
    } catch (err) {
        alert("❌ Gagal: " + err.message);
        btn.disabled = false;
        btn.textContent = "KIRIM PENDAFTARAN";
    }
};
</script>
</body>
</html>
