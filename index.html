<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSB Wind Soccer - Selamat Datang</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #003399;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url("lapangan.jpeg") no-repeat center center/cover;
      opacity: 0.25;
      z-index: -3;
    }
    .bg-slideshow {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden;
    }
    .bg-slideshow img {
      position: absolute; width: 100%; height: 100%;
      object-fit: cover; opacity: 0; transition: opacity 1.5s ease-in-out;
    }
    .bg-slideshow img.active { opacity: 1; }
    .container {
      background: rgba(255,255,255,0.95);
      padding: 40px 30px;
      border-radius: 18px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
      z-index: 1;
      animation: fadeIn 0.7s ease-in-out;
      color: #003399;
    }
    .logo { width: 120px; margin-bottom: 15px; }
    h1 { margin-bottom: 10px; font-size: 24px; font-weight: bold; }
    p { margin-bottom: 20px; font-size: 14px; font-style: italic; color: #333; }
    .password-container { position: relative; width: 100%; margin-bottom: 15px; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      text-align: center;
      box-sizing: border-box;
    }
    .toggle-password {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #666;
      font-size: 18px;
      user-select: none;
    }
    .btn {
      display: block; width: 100%; padding: 12px; margin: 8px 0;
      border-radius: 10px; font-size: 15px; font-weight: bold;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    .btn-login { background: #003399; color: #fff; }
    .btn-daftar { background: #ff9800; color: #fff; }
    .btn-beasiswa { background: #28a745; color: #fff; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .alert-modal {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: 260px;
      padding: 20px;
      border-radius: 16px;
      background: white;
      color: #333;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .alert-success { border-top: 6px solid #28a745; }
    .alert-error { border-top: 6px solid #dc3545; }
    .alert-warn { border-top: 6px solid #ff9800; }
    .alert-info { border-top: 6px solid #003399; }
    @keyframes zoomIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    footer { margin-top: 15px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="bg-slideshow">
    <img src="coach.png" class="active" onerror="this.src='https://via.placeholder.com/800x600?text=Wind+Soccer'">
    <img src="pemain.png" onerror="this.src='https://via.placeholder.com/800x600?text=SSB+Wind+Soccer'">
  </div>
  <div class="container">
    <img src="logossb.png" class="logo" alt="Logo SSB" onerror="this.src='https://via.placeholder.com/120'">
    <h1>Selamat Datang</h1>
    <p>SSB Wind Soccer - Membentuk pemain profesional sejak dini</p>
   
    <form id="formLogin">
      <div class="password-container">
        <input type="password" id="nisw" placeholder="Masukkan NISW" required>
        <span class="toggle-password" id="togglePassword">👁️</span>
      </div>
      <button type="submit" class="btn btn-login" id="btnLoginSiswa">Masuk Siswa</button>
    </form>
    <button class="btn btn-daftar" onclick="window.location.href='pendaftaran.html'">Daftar Baru</button>
    <button class="btn btn-beasiswa" onclick="window.location.href='pendaftaran_beasiswa.html'">Daftar Beasiswa</button>
    <button class="btn btn-login" style="background:#444" id="btnAdmin">Login Admin</button>
   
    <footer>© 2026 SSB Wind Soccer</footer>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script>
// 1. KONFIGURASI FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyC-DVKZfDHpfFl6kE_uupT5GFinwNaWhpw",
    authDomain: "ssb-wind-soccer-110.firebaseapp.com",
    databaseURL: "https://ssb-wind-soccer-110-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "ssb-wind-soccer-110",
    storageBucket: "ssb-wind-soccer-110.firebasestorage.app",
    messagingSenderId: "128234924459",
    appId: "1:128234924459:web:37d97f167996d7d67ecaee"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. BACKGROUND SLIDESHOW
const slides = document.querySelectorAll(".bg-slideshow img");
let current = 0;
setInterval(() => {
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");
}, 5000);

// 3. ALERT MODAL
function showAlert(msg, type = "success") {
    const box = document.createElement("div");
    box.className = `alert-modal alert-${type}`;
    box.innerHTML = `<div>${msg}</div>`;
    document.body.appendChild(box);
    setTimeout(() => { box.remove(); }, 2500);
}

// 4. TOGGLE PASSWORD
document.getElementById("togglePassword").onclick = function() {
    const niswInput = document.getElementById("nisw");
    niswInput.type = (niswInput.type === "password") ? "text" : "password";
    this.textContent = (niswInput.type === "password") ? "👁️" : "🙈";
};

// 5. LOGIN SISWA
document.getElementById("formLogin").onsubmit = function(e) {
    e.preventDefault();
    const niswVal = document.getElementById("nisw").value.trim().toUpperCase();
    const btn = document.getElementById("btnLoginSiswa");
    if (niswVal === "110ADMIN") {
        showAlert("Gunakan tombol Login Admin!", "error");
        return;
    }
    btn.disabled = true;
    btn.textContent = "Mengecek NISW...";
    db.ref('pendaftar/' + niswVal).once('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            sessionStorage.setItem("userSSB", JSON.stringify(data));
            showAlert("Selamat Datang, " + data.nama + "!", "success");
            setTimeout(() => { window.location.href = "beranda.html"; }, 1500);
        } else {
            showAlert("NISW Tidak Ditemukan!", "error");
            btn.disabled = false;
            btn.textContent = "Masuk Siswa";
        }
    });
};

// 6. LOGIN ADMIN
document.getElementById("btnAdmin").onclick = () => {
    const pass = document.getElementById("nisw").value.trim();
    if (pass.toLowerCase() === "110admin") {
        showAlert("Akses Admin Diterima", "info");
        setTimeout(() => { window.location.href = "admin.html"; }, 900);
    } else {
        showAlert("Masukkan Kode Admin di kotak NISW!", "error");
    }
};
</script>
</body>
</html>
