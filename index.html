<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSB Wind Soccer - Selamat Datang</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #003399 0%, #1a5cb8 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Background slideshow */
    .bg-slideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-slideshow img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .bg-slideshow img.active {
      opacity: 0.3;
    }

    /* Container */
    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 30px;
      border-radius: 20px;
      max-width: 420px;
      width: 95%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      z-index: 10;
      animation: slideUp 0.8s ease-out;
      position: relative;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .logo {
      width: 140px;
      height: auto;
      margin: 0 auto 20px;
      display: block;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* Header */
    h1 {
      color: #003399;
      font-size: 26px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .subtitle {
      color: #666;
      font-size: 13px;
      font-style: italic;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    .password-container {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 14px 45px 14px 15px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      font-size: 14px;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
      color: #333;
    }

    input:focus {
      outline: none;
      border-color: #003399;
      box-shadow: 0 0 10px rgba(0, 51, 153, 0.2);
    }

    input::placeholder {
      color: #999;
    }

    /* Toggle password */
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      transition: all 0.2s;
    }

    .toggle-password:hover {
      transform: translateY(-50%) scale(1.2);
    }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin-bottom: 10px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Poppins', sans-serif;
    }

    .btn-login {
      background: linear-gradient(135deg, #003399 0%, #0066cc 100%);
      color: white;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 51, 153, 0.4);
    }

    .btn-login:active {
      transform: translateY(-1px);
    }

    .btn-daftar {
      background: linear-gradient(135deg, #ff9800 0%, #ffa500 100%);
      color: white;
    }

    .btn-daftar:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 152, 0, 0.4);
    }

    .btn-daftar:active {
      transform: translateY(-1px);
    }

    .btn-beasiswa {
      background: linear-gradient(135deg, #28a745 0%, #32c753 100%);
      color: white;
    }

    .btn-beasiswa:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
    }

    .btn-beasiswa:active {
      transform: translateY(-1px);
    }

    .btn-admin {
      background: linear-gradient(135deg, #444 0%, #555 100%);
      color: white;
    }

    .btn-admin:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-admin:active {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Footer */
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }

    /* Alert Modal */
    .alert-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 280px;
      max-width: 85%;
      padding: 25px;
      border-radius: 18px;
      background: white;
      color: #333;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border-top: 5px solid #999;
    }

    .alert-modal.alert-success {
      border-top-color: #28a745;
    }

    .alert-modal.alert-error {
      border-top-color: #dc3545;
    }

    .alert-modal.alert-warn {
      border-top-color: #ff9800;
    }

    .alert-modal.alert-info {
      border-top-color: #003399;
    }

    .alert-modal svg {
      width: 50px;
      height: 50px;
    }

    .alert-modal div {
      font-weight: 600;
      font-size: 15px;
      line-height: 1.5;
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* Loading spinner */
    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-radius: 50%;
      border-top: 2px solid white;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        border-radius: 15px;
      }

      h1 {
        font-size: 22px;
      }

      .logo {
        width: 100px;
      }

      .btn {
        padding: 12px 15px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <!-- Background Slideshow -->
  <div class="bg-slideshow">
    <img src="coach.png" class="active" onerror="this.src='https://via.placeholder.com/800x600?text=Coach'">
    <img src="pemain.png" onerror="this.src='https://via.placeholder.com/800x600?text=Pemain'">
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Logo -->
    <img src="logossb.png" class="logo" alt="Logo SSB Wind Soccer" onerror="this.src='https://via.placeholder.com/140?text=SSB'">

    <!-- Header -->
    <h1>SSB Wind Soccer</h1>
    <p class="subtitle">Membentuk Pemain Profesional Sejak Dini</p>

    <!-- Login Form -->
    <form id="formLogin">
      <div class="form-group">
        <div class="password-container">
          <input 
            type="password" 
            id="nisw" 
            placeholder="Masukkan NISW"
            autocomplete="username"
            required
          >
          <span class="toggle-password" id="togglePassword" title="Lihat/Sembunyikan">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn btn-login">Masuk Siswa</button>
    </form>

    <!-- Other Buttons -->
    <button type="button" class="btn btn-daftar" id="btnDaftar">Daftar Reguler</button>
    <button type="button" class="btn btn-beasiswa" id="btnBeasiswa">Daftar Beasiswa</button>
    <button type="button" class="btn btn-admin" id="btnAdmin">Login Admin</button>

    <!-- Footer -->
    <div class="footer">
      © 2026 SSB Wind Soccer • Sekolah Sepak Bola
    </div>
  </div>

  <!-- ===== FIREBASE SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <!-- ===== CONFIG & DATABASE ===== -->
  <script src="firebase-config.js"></script>
  <script src="db-sync.js"></script>

  <!-- ===== MAIN SCRIPT ===== -->
  <script>
    console.log("🌐 Index.html loaded");

    // ===== BACKGROUND SLIDESHOW =====
    const slides = document.querySelectorAll(".bg-slideshow img");
    let current = 0;
    
    if (slides.length > 1) {
      console.log("🎬 Background slideshow initialized");
      setInterval(() => {
        slides[current].classList.remove("active");
        current = (current + 1) % slides.length;
        slides[current].classList.add("active");
      }, 5000);
    }

    // ===== ALERT FUNCTION =====
    function showAlert(msg, type = "success", duration = 2200) {
      console.log(`📢 Alert [${type}]:`, msg);
      
      const icons = {
        success: '<svg viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        error: '<svg viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
        warn: '<svg viewBox="0 0 24 24" fill="none" stroke="#ff9800" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none" stroke="#003399" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>'
      };
      
      const box = document.createElement("div");
      box.className = `alert-modal alert-${type}`;
      box.innerHTML = `${icons[type]}<div>${msg}</div>`;
      document.body.appendChild(box);
      
      setTimeout(() => {
        box.style.opacity = "0";
        box.style.transition = "opacity 0.4s ease";
        setTimeout(() => box.remove(), 400);
      }, duration);
    }

    // ===== TOGGLE PASSWORD =====
    document.getElementById("togglePassword").addEventListener("click", function() {
      console.log("🔒 Toggle password visibility");
      const niswInput = document.getElementById("nisw");
      const isPassword = niswInput.type === "password";
      niswInput.type = isPassword ? "text" : "password";
      this.textContent = isPassword ? "🙈" : "👁️";
    });

    // ===== LOGIN SISWA =====
    document.getElementById("formLogin").addEventListener("submit", function(e) {
      e.preventDefault();
      
      console.log("🔐 Login form submitted");
      
      const niswVal = document.getElementById("nisw").value.trim();
      const btnSubmit = this.querySelector("button[type='submit']");
      
      if (!niswVal) {
        showAlert("❌ NISW tidak boleh kosong!", "warn");
        return;
      }

      // Cek admin code
      if (niswVal.toLowerCase() === "110admin") {
        showAlert("⚠️ Gunakan tombol LOGIN ADMIN", "error");
        document.getElementById("nisw").value = '';
        return;
      }

      const niswInput = niswVal.toUpperCase();
      
      // Disable button & show loading
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '<span class="loading-spinner"></span>Memeriksa...';

      console.log("🔍 Searching for NISW:", niswInput);

      // Query siswa
      DBManager.findSiswa(niswInput, function(siswa) {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = 'Masuk Siswa';

        if (siswa) {
          console.log("✅ Siswa ditemukan:", siswa.nama);
          DBManager.setLoginUser(siswa);
          showAlert("✅ Selamat Datang, " + siswa.nama + "!", "success", 1500);
          setTimeout(() => { 
            window.location.href = "beranda.html"; 
          }, 1500);
        } else {
          console.warn("❌ NISW tidak terdaftar:", niswInput);
          showAlert("❌ NISW Tidak Terdaftar", "error");
          document.getElementById("nisw").value = '';
        }
      });
    });

        // ===== LOGIN ADMIN =====
    document.getElementById("btnAdmin").addEventListener("click", function() {
      console.log("🔐 Admin login clicked");
      
      const pass = document.getElementById("nisw").value.trim();
      
      console.log("Input value:", pass);
      console.log("Is match 110admin?", pass.toLowerCase() === "110admin");
      
      if (pass && pass.toLowerCase() === "110admin") {
        console.log("✅ Admin code ACCEPTED");
        showAlert("✅ Akses Admin Diterima", "info", 900);
        
        // Set admin session
        sessionStorage.setItem('adminLogged', 'true');
        localStorage.setItem('adminLogged', 'true');
        
        setTimeout(() => { 
          console.log("🔄 Redirecting to admin.html");
          window.location.href = "admin.html"; 
        }, 900);
      } else {
        console.warn("❌ Invalid admin code:", pass);
        showAlert("❌ Kode Admin Salah", "error");
        document.getElementById("nisw").value = '';
      }
    });

    // ===== TOMBOL DAFTAR REGULER =====
    document.getElementById("btnDaftar").addEventListener("click", function() {
      console.log("📝 Navigating to pendaftaran.html");
      window.location.href = "pendaftaran.html";
    });

    // ===== TOMBOL DAFTAR BEASISWA =====
    document.getElementById("btnBeasiswa").addEventListener("click", function() {
      console.log("📝 Navigating to pendaftaran_beasiswa.html");
      window.location.href = "pendaftaran_beasiswa.html";
    });

    console.log("🚀 Index.html script initialized");
  </script>
</body>
</html>
