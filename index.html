<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSB Wind Soccer - Selamat Datang</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #003399;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url("lapangan.jpeg") no-repeat center center/cover;
      opacity: 0.25;
      z-index: -3;
    }
    .bg-slideshow {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden;
    }
    .bg-slideshow img {
      position: absolute; width: 100%; height: 100%;
      object-fit: cover; opacity: 0; transition: opacity 1.5s ease-in-out;
    }
    .bg-slideshow img.active { opacity: 1; }
    .container {
      background: rgba(255,255,255,0.95);
      padding: 40px 30px;
      border-radius: 18px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
      z-index: 1;
      animation: fadeIn 0.7s ease-in-out;
      color: #003399;
    }
    .logo { width: 120px; margin-bottom: 15px; }
    h1 { margin-bottom: 10px; font-size: 24px; font-weight: bold; }
    p { margin-bottom: 20px; font-size: 14px; font-style: italic; color: #333; }
    .password-container { position: relative; width: 100%; margin-bottom: 15px; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      text-align: center;
      box-sizing: border-box;
    }
    .toggle-password {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #666;
      font-size: 18px;
      user-select: none;
    }
    .btn {
      display: block; width: 100%; padding: 12px; margin: 8px 0;
      border-radius: 10px; font-size: 15px; font-weight: bold;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    .btn-login { background: #003399; color: #fff; }
    .btn-daftar { background: #ff9800; color: #fff; }
    .btn-beasiswa { background: #28a745; color: #fff; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .btn:active { transform: translateY(0); }
    .alert-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 260px;
      max-width: 80%;
      padding: 20px;
      border-radius: 16px;
      background: white;
      color: #333;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid #eee;
    }
    .alert-modal div { font-weight: 600; font-size: 15px; line-height: 1.4; }
    .alert-success { border-top: 6px solid #28a745; }
    .alert-error { border-top: 6px solid #dc3545; }
    .alert-warn { border-top: 6px solid #ff9800; }
    .alert-info { border-top: 6px solid #003399; }
    @keyframes zoomIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    footer { margin-top: 15px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="bg-slideshow">
    <img src="coach.png" class="active">
    <img src="pemain.png">
  </div>
  <div class="container">
    <img src="logossb.png" class="logo" alt="Logo SSB">
    <h1>Selamat Datang</h1>
    <p>SSB Wind Soccer - Membentuk pemain profesional sejak dini</p>
  
    <form id="formLogin">
      <div class="password-container">
        <input type="password" id="nisw" placeholder="Masukkan NISW" autocomplete="username" required>
        <span class="toggle-password" id="togglePassword" title="Lihat/Sembunyikan">👁️</span>
      </div>
      <button type="submit" class="btn btn-login">Masuk Siswa</button>
    </form>
    <button class="btn btn-daftar" id="btnDaftar">Daftar Baru</button>
    <button class="btn btn-beasiswa" id="btnBeasiswa">Daftar Beasiswa</button>
    <button class="btn btn-login" style="background:#444" id="btnAdmin">Login Admin</button>
  
    <footer>© 2026 SSB Wind Soccer</footer>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="db-sync.js"></script>

  <script>
    console.log("🚀 index.html loaded");

    const slides = document.querySelectorAll(".bg-slideshow img");
    let current = 0;
    if (slides.length > 1) {
      setInterval(() => {
        slides[current].classList.remove("active");
        current = (current + 1) % slides.length;
        slides[current].classList.add("active");
      }, 5000);
    }

    function showAlert(msg, type = "success", time = 2200) {
      const icons = {
        success: '<svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        error: '<svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
        warn: '<svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#ff9800" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
        info: '<svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#003399" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>'
      };
      const box = document.createElement("div");
      box.className = `alert-modal alert-${type}`;
      box.innerHTML = `${icons[type]}<div>${msg}</div>`;
      document.body.appendChild(box);
      setTimeout(() => {
        box.style.opacity = "0";
        box.style.transition = "0.4s ease";
        setTimeout(() => box.remove(), 400);
      }, time);
    }

    document.getElementById("togglePassword").onclick = function() {
      const niswInput = document.getElementById("nisw");
      niswInput.type = (niswInput.type === "text") ? "password" : "text";
      this.textContent = niswInput.type === "text" ? "🙈" : "👁️";
    };

    // LOGIN SISWA
    document.getElementById("formLogin").onsubmit = function(e) {
      e.preventDefault();
      const niswVal = document.getElementById("nisw").value.trim();
      if (!niswVal) {
        showAlert("NISW tidak boleh kosong!", "warn");
        return;
      }
      if (niswVal.toLowerCase() === "110admin") {
        showAlert("Kode Admin tidak boleh digunakan di sini.<br>Gunakan tombol <strong>Login Admin</strong>", "error");
        document.getElementById("nisw").value = '';
        return;
      }
      const niswInput = niswVal.toUpperCase();
      const btnSubmit = document.querySelector(".btn-login[type='submit']");
      if (btnSubmit) { btnSubmit.disabled = true; btnSubmit.textContent = "Memeriksa..."; }

      console.log("🔍 Mencari siswa:", niswInput);

      DBManager.findSiswa(niswInput, function(siswa) {
        if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = "Masuk Siswa"; }
        if (siswa) {
          console.log("✅ Siswa ditemukan:", siswa);
          DBManager.setLoginUser(siswa);
          showAlert("Selamat Datang, " + siswa.nama + "!", "success");
          setTimeout(() => { window.location.href = "beranda.html"; }, 1500);
        } else {
          showAlert("NISW Tidak Terdaftar", "error");
          console.log("❌ NISW tidak ditemukan:", niswInput);
          document.getElementById("nisw").value = '';
        }
      });
    };

    // LOGIN ADMIN
    document.getElementById("btnAdmin").onclick = () => {
      const pass = document.getElementById("nisw").value.trim();
      console.log("🔐 Admin login attempt");
      
      if (pass && pass.toLowerCase() === "110admin") {
        console.log("✅ Kode Admin benar!");
        sessionStorage.setItem("adminLogin", "true");
        sessionStorage.setItem("adminTime", new Date().getTime().toString());
        
        showAlert("✅ Akses Admin Diterima", "info");
        
        setTimeout(() => { 
          console.log("🚀 Redirect ke admin.html");
          window.location.href = "admin.html"; 
        }, 900);
      } else {
        console.log("❌ Kode Admin salah!");
        showAlert("❌ Kode Admin Salah<br>Gunakan: 110admin", "error");
        document.getElementById("nisw").value = '';
      }
    };

    document.getElementById("btnDaftar").onclick = () => window.location.href = "pendaftaran.html";
    document.getElementById("btnBeasiswa").onclick = () => window.location.href = "pendaftaran_beasiswa.html";

    console.log("✅ index.html ready");
  </script>
</body>
</html>
